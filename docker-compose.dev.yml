services:
  api:
    build:
      context: .
      target: builder
    volumes:
      - .:/app
      - /app/.venv  # don't shadow the in-image virtualenv
    command: ["uv", "run", "uvicorn", "govlink.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      GOVLINK_ENV: development
      GOVLINK_LOG_LEVEL: DEBUG

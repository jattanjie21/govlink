<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GovLink — open data API for Gambian government datasets." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Geist:wght@400;500;600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("govlink-theme");
          var theme = saved === "dark" || saved === "light" ? saved : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          /* localStorage not available — fall through to default light */
        }
      })();
    </script>
    <title>GovLink</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
